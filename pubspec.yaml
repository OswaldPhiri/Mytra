name: mytra
description: Smart Budget Tracker - Auto-tracks expenses from SMS and notifications
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Dependency Injection
  get_it: ^8.0.2

  # Routing
  go_router: ^14.6.2

  # Charts
  fl_chart: ^0.69.0

  # JSON
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.3.3

  # Permissions
  permission_handler: ^11.3.1

  # SMS
  another_telephony: ^0.4.1
  flutter_sms_inbox: 1.0.5

  # Notification Listener
  notification_listener_service: ^1.0.0

  # Background tasks
  flutter_foreground_task: ^8.14.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Export
  excel: ^4.0.6
  csv: ^6.0.0

  # File handling
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  share_plus: ^10.1.4

  # Internationalization
  intl: ^0.19.0

  # Icons and UI
  material_symbols_icons: ^4.2831.0

  # Encryption
  encrypt: ^5.0.3

  # Logging
  logger: ^2.5.0

  # UUID
  uuid: ^4.5.1

  # Freezed
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.0
  freezed: ^2.5.7

  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
